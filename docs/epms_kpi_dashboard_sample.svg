<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .h2 { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .kpiLabel { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .kpiVal { font: 800 36px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .kpiUnit { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .tiny { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .pill { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #fff; }
      .small { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
    </style>
  </defs>

  <rect x="0" y="0" width="1440" height="920" fill="url(#bg)"/>

  <rect x="28" y="22" width="1384" height="104" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="52" y="64" class="title">EPMS KPI Dashboard (Sample)</text>
  <text x="52" y="92" class="sub">DB source: epms (SQL Server) | Anchor time: 2026-02-11 14:28:44 | Window: last 24h</text>

  <rect x="1060" y="46" width="146" height="36" rx="18" fill="#0f766e"/>
  <text x="1095" y="69" class="pill">Power Quality</text>
  <rect x="1216" y="46" width="168" height="36" rx="18" fill="#1d4ed8"/>
  <text x="1248" y="69" class="pill">Operations Health</text>

  <rect x="28" y="144" width="1384" height="248" rx="16" fill="url(#cardA)" stroke="#cbd5e1"/>
  <text x="52" y="178" class="h2">Core Operation KPIs</text>

  <rect x="52" y="196" width="320" height="176" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="72" y="228" class="kpiLabel">Total Meters</text>
  <text x="72" y="278" class="kpiVal">178</text>
  <text x="72" y="306" class="kpiUnit">installed</text>

  <rect x="392" y="196" width="320" height="176" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="412" y="228" class="kpiLabel">Reporting (15m)</text>
  <text x="412" y="278" class="kpiVal">57</text>
  <text x="412" y="306" class="kpiUnit">32.0% of all meters</text>

  <rect x="732" y="196" width="320" height="176" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="752" y="228" class="kpiLabel">Samples in 24h</text>
  <text x="752" y="278" class="kpiVal">12,565</text>
  <text x="752" y="306" class="kpiUnit">measurement rows</text>

  <rect x="1072" y="196" width="320" height="176" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="1092" y="228" class="kpiLabel">Alarms (30d)</text>
  <text x="1092" y="278" class="kpiVal">680</text>
  <text x="1092" y="306" class="kpiUnit">last alarm: 2026-02-06 03:56:58</text>

  <rect x="28" y="410" width="1384" height="248" rx="16" fill="url(#cardA)" stroke="#cbd5e1"/>
  <text x="52" y="444" class="h2">Power Quality KPIs (24h)</text>

  <rect x="52" y="462" width="260" height="176" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="72" y="492" class="kpiLabel">Average PF</text>
  <text x="72" y="540" class="kpiVal">0.9358</text>

  <rect x="328" y="462" width="260" height="176" rx="12" fill="#ffffff" stroke="#fecaca"/>
  <text x="348" y="492" class="kpiLabel">PF &lt; 0.9</text>
  <text x="348" y="540" class="kpiVal">29.92%</text>

  <rect x="604" y="462" width="260" height="176" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="624" y="492" class="kpiLabel">Freq in 59.8-60.2Hz</text>
  <text x="624" y="540" class="kpiVal">99.99%</text>

  <rect x="880" y="462" width="260" height="176" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="900" y="492" class="kpiLabel">V Unbalance &gt; 2%</text>
  <text x="900" y="540" class="kpiVal">0.00%</text>

  <rect x="1156" y="462" width="236" height="176" rx="12" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="1176" y="492" class="kpiLabel">THD &gt; 5%</text>
  <text x="1176" y="540" class="kpiVal">0.00%</text>

  <rect x="28" y="676" width="1384" height="216" rx="16" fill="url(#cardA)" stroke="#cbd5e1"/>
  <text x="52" y="710" class="h2">Site Insight</text>

  <rect x="52" y="730" width="680" height="140" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="72" y="764" class="small">Top building by avg active power (24h)</text>
  <text x="72" y="812" class="kpiVal">동관</text>
  <text x="250" y="812" class="kpiVal">13,872.24 kW</text>

  <rect x="748" y="730" width="644" height="140" rx="12" fill="#ffffff" stroke="#dbeafe"/>
  <text x="768" y="764" class="small">Interpretation</text>
  <text x="768" y="792" class="tiny">- Meter activity ratio is low (57/178 in 15m). Check polling map and PLC link states.</text>
  <text x="768" y="814" class="tiny">- PF low ratio (29.92%) is the primary quality risk in this dataset.</text>
  <text x="768" y="836" class="tiny">- Voltage unbalance / THD are stable in the latest 24h snapshot.</text>

  <text x="28" y="910" class="tiny">Sample image generated from live DB query results in this workspace.</text>
</svg>
